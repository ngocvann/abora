spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/abora?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:abora}

    password: ${DB_PASSWORD:1306}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  resend:
    api-key: ${RESEND_API_KEY:re_123456789}
    from: ${MAIL_FROM:onboarding@resend.dev}

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:SuperSecretJwtKeyChange2023!ExtraCharsForLengthIsRequired256bits}
    access-token-expiration-minutes: 1440
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  google:
    client-id: ${GOOGLE_CLIENT_ID:426028933949-d82gdpajo4cvd8c511t5kse0ujl0jj06.apps.googleusercontent.com}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:abora-dummy}
  api-key: ${CLOUDINARY_API_KEY:1234567890}
  api-secret: ${CLOUDINARY_API_SECRET:abcdefgh}